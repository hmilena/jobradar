version: "3.9"

services:
  # ── PostgreSQL local (substitui Supabase no dev) ──────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jobrador
      POSTGRES_USER: jobrador
      POSTGRES_PASSWORD: jobrador
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # roda migrations na subida
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobrador"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jobrador:jobrador@db:5432/jobrador
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./scraper:/app/scraper
      - ./db:/app/db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  pgdata:
