name: JobRadar Scraper

on:
  schedule:
    - cron: "0 23 * * *"   # uma vez por dia às 23h UTC (meia-noite em Portugal)
  workflow_dispatch:          # permite rodar manualmente no GitHub
  push:
    paths:
      - "db/seed/companies.json"  # dispara ao adicionar empresas

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python -m scraper.scheduler --source all
